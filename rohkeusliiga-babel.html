function makeLevels(avatarEmoji) {
  return [
    { min: 0,   max: 14,  emoji: avatarEmoji,                   title: "Pieni rohkeus",       desc: "Rohkeus on alkamassa" },
    { min: 15,  max: 39,  emoji: avatarEmoji + "❤️",            title: "Rohkea sydän",        desc: "Rohkeus alkaa sisältä" },
    { min: 40,  max: 79,  emoji: avatarEmoji + "🛡️",            title: "Rohkeus suojaa",      desc: "Rohkea ei pelkää virheitä" },
    { min: 80,  max: 149, emoji: avatarEmoji + "⚔️",            title: "Rohkeus pystyy",      desc: "Rohkea uskaltaa toimia" },
    { min: 150, max: Infinity, emoji: avatarEmoji + "👑✨",      title: "Rohkeuden mestari",   desc: "Rohkeudesta on tullut osa sinua" },
  ];
}

function getCharacterLevel(points, avatarEmoji) {
  const levels = makeLevels(avatarEmoji);
  for (let i = levels.length - 1; i >= 0; i--) {
    if (points >= levels[i].min) return { level: i + 1, ...levels[i] };
  }
  return { level: 1, ...levels[0] };
}

function calcSessionPoints(s) {
  let p = 0;
  if (s.bravestMoment) p += 1;
  if (s.continuedAfterMistake === "yes") p += 2;
  if (s.missionAttempted === "yes") p += 1;
  return p;
}

function maybeGetSurprise(session) {
  if (!session.bravestMoment) return null;
  if (Math.random() > 0.15) return null;
  return SURPRISES[Math.floor(Math.random() * SURPRISES.length)];

// Valitsee päivän tehtävän painotuksen perusteella.
// Painotukset: "balanced" (tasaisesti), "defense60" (60% puolustus), "defense70" (70% puolustus),
// "attack60" (60% hyökkäys), "attack70" (70% hyökkäys).
// Loppuosa on aina sekoitus yleisiä ja toista kategoriaa.
function pickMissionForToday(focus) {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

  // Yhdistetty pooli painotuksen mukaan
  let pool = [];
  if (focus === "defense70") {
    pool = [].concat(MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_ATTACK);
  } else if (focus === "defense60") {
    pool = [].concat(MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_ATTACK, MISSIONS_ATTACK);
  } else if (focus === "attack70") {
    pool = [].concat(MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_DEFENSE);
  } else if (focus === "attack60") {
    pool = [].concat(MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_DEFENSE, MISSIONS_DEFENSE);
  } else {
    // balanced
    pool = [].concat(MISSIONS_DEFENSE, MISSIONS_ATTACK, MISSIONS_GENERAL);
  }

  // Litistä yksittäisten tehtävien listaksi
  const flat = [];
  pool.forEach(arr => { arr.forEach(m => flat.push(m)); });
  const mission = flat[seed % flat.length];

  // Selvitä mistä kategoriasta valittu tehtävä on
  let type = "general";
  if (MISSIONS_DEFENSE.indexOf(mission) !== -1) type = "defense";
  else if (MISSIONS_ATTACK.indexOf(mission) !== -1) type = "attack";

  return { text: mission, type: type };
}

function calculateStreak(history) {
  if (!history || history.length === 0) return 0;
  const days = [...new Set(history.map((h) => new Date(h.date).toDateString()))].map((s) => new Date(s)).sort((a, b) => b - a);
  if (days.length === 0) return 0;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const latest = new Date(days[0]); latest.setHours(0, 0, 0, 0);
  if (latest.getTime() !== today.getTime() && latest.getTime() !== yesterday.getTime()) return 0;
  let streak = 1;
  for (let i = 1; i < days.length; i++) {
    const prev = new Date(days[i - 1]); prev.setHours(0, 0, 0, 0);
    const curr = new Date(days[i]); curr.setHours(0, 0, 0, 0);
    if (Math.round((prev - curr) / (1000 * 60 * 60 * 24)) === 1) streak++;
    else break;
  }
  return streak;
}

function getTotalPoints(history) {
  return history.reduce((sum, s) => sum + (s.points || calcSessionPoints(s)), 0);
}
function getUnlockedAchievements(history) {
  return ACHIEVEMENTS.filter(a => a.check(history));
}

// Yksinkertainen ID-generaattori
function makeId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}


const STORAGE_KEY = "rohkeusliiga.v2";
function loadStorage() {
  try { var raw = localStorage.getItem(STORAGE_KEY); if (!raw) return null; return JSON.parse(raw); } catch (e) { return null; }
}
function saveStorage(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {} }

// ============================================================
// PÄÄKOMPONENTTI
// ============================================================
function Rohkeusliiga() {
  const stored = loadStorage();
  const [players, setPlayers] = useState((stored && stored.players) || []);
  const [activePlayerId, setActivePlayerId] = useState(null);
  const [settings, setSettings] = useState(Object.assign({}, DEFAULT_SETTINGS, (stored && stored.settings) || {}));
  useEffect(function() { saveStorage({ players: players, settings: settings }); }, [players, settings]);

  // Ruutu — alkaa pelaajan valinnasta jos pelaajia on, muuten luonnista
  const [screen, setScreen] = useState("playerSelect");

  // Kirjauksen tila
  const [todayMission] = useState(() => pickMissionForToday(settings.focus));
  const [session, setSession] = useState(emptySession());
  const [currentSurprise, setCurrentSurprise] = useState(null);
  const [newAchievements, setNewAchievements] = useState([]);
  const [previousLevel, setPreviousLevel] = useState(1);

  function emptySession() {
    return {
      date: new Date().toISOString(),
      mood: null, bravestMoment: null, bravestKind: null,
      continuedAfterMistake: null, missionAttempted: null,
      title: "", minutes: 0, points: 0,
    };
  }

  const activePlayer = players.find(p => p.id === activePlayerId);
  const theme = activePlayer ? THEMES[activePlayer.theme] || THEMES.orange : THEMES.orange;

  function calcTitle(s) {
    const map = {
      steal: { text: "Riistoagentti", emoji: "🛡️" }, trick: { text: "Harhautusvelho", emoji: "🌀" },
      run: { text: "Kuljetussalama", emoji: "⚡" }, scared: { text: "Rohkeusleijona", emoji: "🦁" },
      again: { text: "Uudestaan yrittäjä", emoji: "🔁" }, fail: { text: "Mestarimokaaja", emoji: "😅" },
      newthing: { text: "Uuden kokeilija", emoji: "🌱" },
    };
    return map[s.bravestKind] || { text: "Tänään uskalsin -pelaaja", emoji: "💪" };
  }
  function calcMinutes(s, surprise) {
    if (!settings.rewardsOn) return 0;
    let m = s.bravestMoment ? settings.minMinutes : 0;
    if (s.continuedAfterMistake === "yes") m += settings.bonusMinutes;
    if (surprise && surprise.type === "minutes") m += 5;
    return Math.min(m, settings.dailyMaxMinutes);
  }

  function finalizeSession() {
    if (!activePlayer) return;
    const beforePts = getTotalPoints(activePlayer.history || []);
    const beforeLevel = getCharacterLevel(beforePts, getAvatarEmoji(activePlayer)).level;
    setPreviousLevel(beforeLevel);

    const surprise = maybeGetSurprise(session);
    setCurrentSurprise(surprise);

    const titleObj = calcTitle(session);
    let titleText = titleObj.text;
    if (surprise && surprise.type === "title") titleText = "Yllätysrohkea";

    const points = calcSessionPoints(session);
    const minutes = calcMinutes(session, surprise);
    const finished = { ...session, title: `${titleObj.emoji} ${titleText}`, minutes, points };

    const oldHistory = activePlayer.history || [];
    const beforeUnlocked = getUnlockedAchievements(oldHistory).map(a => a.id);
    const newHistory = [...oldHistory, finished];
    const afterUnlocked = getUnlockedAchievements(newHistory);
    const justUnlocked = afterUnlocked.filter(a => !beforeUnlocked.includes(a.id));

    setSession(finished);
    setNewAchievements(justUnlocked);
    setPlayers(players.map(p => p.id === activePlayerId ? { ...p, history: newHistory } : p));
  }

  function startNewSession() {
    setSession(emptySession());
    setCurrentSurprise(null);
    setNewAchievements([]);
    setScreen("home");
  }

  function getAvatarEmoji(player) {
    return AVATARS.find(a => a.id === player.avatar)?.emoji || "🦁";
  }

  // Pelaajan valinta
  function selectPlayer(id) {
    setActivePlayerId(id);
    setSession(emptySession());
    setCurrentSurprise(null);
    setNewAchievements([]);
    setScreen("home");
  }

  function addPlayer({ name, avatar, theme }) {
    const player = {
      id: makeId(),
      name: name.trim(),
      avatar,
      theme: theme || DEFAULT_THEMES_BY_AVATAR[avatar] || "orange",
      history: [],
    };
    setPlayers([...players, player]);
    setActivePlayerId(player.id);
    setScreen("home");
  }

  function updatePlayer(id, updates) {
    setPlayers(players.map(p => p.id === id ? { ...p, ...updates } : p));
  }

  function deletePlayer(id) {
    const remaining = players.filter(p => p.id !== id);
    setPlayers(remaining);
    if (activePlayerId === id) {
      setActivePlayerId(null);
      setScreen("playerSelect");
    }
  }

  function logout() {
    setActivePlayerId(null);
    setScreen("playerSelect");
  }

  // ============================================================
  // RENDER — pelaajan valinta on oma näkymä, muuten normaalit ruudut
  // ============================================================
  const charLevel = activePlayer
    ? getCharacterLevel(getTotalPoints(activePlayer.history || []), getAvatarEmoji(activePlayer))
    : null;
  const charLeveledUp = charLevel && charLevel.level > previousLevel;

  return (
    <div className={`min-h-screen w-full bg-gradient-to-b ${theme.bg}`}>

        .animate-wiggle { animation: wiggle 1.6s ease-in-out infinite; }
        @keyframes float-slow { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-8px) rotate(3deg); } }
        .animate-float { animation: float-slow 4s ease-in-out infinite; }
        @keyframes sparkle { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        .animate-sparkle { animation: sparkle 1.8s ease-in-out infinite; }
        @keyframes bounce-once { 0%, 100% { transform: scale(1); } 30% { transform: scale(1.15); } 60% { transform: scale(0.95); } }
        .animate-bounce-once { animation: bounce-once 0.8s ease-in-out; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 6px rgba(251,191,36,0.6)); } 50% { filter: drop-shadow(0 0 14px rgba(251,191,36,1)); } }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        .font-display { font-family: Georgia, "Times New Roman", serif; font-weight: 800; letter-spacing: -0.01em; }
      `}</style>
      <div className="mx-auto max-w-md px-5 pb-12 pt-6">
        {/* Pelaajan valinta — ei näytetä headeria */}
        {screen === "playerSelect" && (
          <PlayerSelect players={players} onSelect={selectPlayer} onAdd={() => setScreen("addPlayer")} onManage={() => setScreen("managePlayers")} />
        )}
        {screen === "addPlayer" && (
          <AddPlayer onSave={addPlayer} onCancel={() => setScreen(players.length > 0 ? "playerSelect" : "playerSelect")} canCancel={players.length > 0} />
        )}
        {screen === "managePlayers" && (
          <ManagePlayers players={players} onUpdate={updatePlayer} onDelete={deletePlayer} onBack={() => setScreen("playerSelect")} />
        )}

        {/* Kirjautuneen näkymät */}
        {activePlayer && screen !== "playerSelect" && screen !== "addPlayer" && screen !== "managePlayers" && (
          <>
            <header className="mb-6 flex items-center justify-between">
              <button onClick={() => setScreen("home")} className="font-display text-2xl text-amber-900">
                Rohkeusliiga
              </button>
              <div className="flex gap-2">
                <button onClick={() => setScreen("achievements")} className="rounded-full bg-white/70 p-2 text-amber-800 shadow" aria-label="Saavutukset">
                  <span className="text-lg">🏅</span>
                </button>
                <button onClick={() => setScreen("week")} className="rounded-full bg-white/70 p-2 text-amber-800 shadow" aria-label="Viikkonäkymä">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </button>
                <button onClick={() => setScreen("settings")} className="rounded-full bg-white/70 p-2 text-amber-800 shadow" aria-label="Asetukset">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <button onClick={logout} className="rounded-full bg-white/70 p-2 text-amber-800 shadow" aria-label="Vaihda pelaajaa">
                  <span className="text-lg">👤</span>
                </button>
              </div>
            </header>

            {screen === "home" && <Home player={activePlayer} mission={todayMission} streak={calculateStreak(activePlayer.history || [])} charLevel={charLevel} theme={theme} totalPoints={getTotalPoints(activePlayer.history || [])} onStart={() => { setSession(emptySession()); setCurrentSurprise(null); setNewAchievements([]); setScreen("mood"); }} onUpdatePlayer={(updates) => updatePlayer(activePlayerId, updates)} />}
            {screen === "mood" && <Mood player={activePlayer} value={session.mood} onPick={(m) => setSession({ ...session, mood: m })} onNext={() => setScreen("moment")} onBack={() => setScreen("home")} onSkip={() => setScreen("moment")} />}
            {screen === "moment" && <Moment session={session} setSession={setSession} onNext={() => setScreen("again")} onBack={() => setScreen("mood")} onSkip={() => setScreen("again")} />}
            {screen === "again" && <Again session={session} setSession={setSession} onNext={() => setScreen("mission")} onBack={() => setScreen("moment")} onSkip={() => setScreen("mission")} />}
            {screen === "mission" && <MissionCheck mission={todayMission} session={session} setSession={setSession} onNext={() => { finalizeSession(); setScreen("result"); }} onBack={() => setScreen("again")} onSkip={() => { finalizeSession(); setScreen("result"); }} />}
            {screen === "result" && <Result player={activePlayer} session={session} settings={settings} surprise={currentSurprise} newAchievements={newAchievements} charLevel={charLevel} charLeveledUp={charLeveledUp} theme={theme} onDone={startNewSession} />}
            {screen === "settings" && <SettingsScreen settings={settings} setSettings={setSettings} onBack={() => setScreen("home")} onManagePlayers={() => setScreen("managePlayers")} />}
            {screen === "week" && <WeekView player={activePlayer} onBack={() => setScreen("home")} />}
            {screen === "achievements" && <AchievementsScreen history={activePlayer.history || []} onBack={() => setScreen("home")} />}
          </>
        )}
      </div>
    </div>
  );
}

// ============================================================
// PELAAJAN VALINTA
// Tärkeää: tässä näkymässä EI näytetä pelaajien pisteitä, tasoja tai saavutuksia.
// Vain nimi + hahmo. Ei vertailua mahdolliseksi.
// ============================================================
function PlayerSelect({ players, onSelect, onAdd, onManage }) {
  if (players.length === 0) {
    // Ensimmäinen kerta — ohjataan suoraan luontiin
    return (
      <div className="animate-pop pt-12 text-center">
        <div className="text-6xl mb-6">🦁</div>
        <h1 className="font-display text-3xl text-amber-900 mb-3">Tervetuloa Rohkeusliigaan!</h1>
        <p className="text-amber-800/80 mb-8 leading-relaxed">
          Lisää ensin pelaaja, niin pääsette aloittamaan.
        </p>
        <BigButton onClick={onAdd}>➕ Lisää pelaaja</BigButton>
      </div>
    );
  }

  return (
    <div className="animate-pop">
      <h1 className="font-display text-3xl text-amber-900 mb-2 text-center">Kuka pelaa tänään?</h1>
      <p className="text-amber-800/70 mb-6 text-center">Valitse pelaaja</p>

      <div className="space-y-3 mb-5">
        {players.map(p => {
          const avatar = AVATARS.find(a => a.id === p.avatar);
          const playerTheme = THEMES[p.theme] || THEMES.orange;
          return (
            <button
              key={p.id}
              onClick={() => onSelect(p.id)}
              className={`w-full flex items-center gap-4 rounded-2xl border-2 p-5 shadow-xl transition active:translate-y-0.5 bg-gradient-to-br ${playerTheme.gradient} text-white`}
            >
              <div className="text-5xl">{avatar?.emoji || "🦁"}</div>
              <div className="flex-1 text-left">
                <div className="font-display text-2xl" style={{ textShadow: '0 1px 4px rgba(0,0,0,0.3)' }}>{p.name}</div>
                <div className="text-sm opacity-90">Aloita pelaaminen</div>
              </div>
              <div className="text-2xl opacity-80">→</div>
            </button>
          );
        })}
      </div>

      <button
        onClick={onAdd}
        className="w-full rounded-2xl border-2 border-dashed border-amber-400 bg-white/60 p-4 font-display text-lg text-amber-900 active:translate-y-0.5"
      >
        ➕ Lisää uusi pelaaja
      </button>

      <button
        onClick={onManage}
        className="w-full mt-3 text-center text-sm text-amber-800/70"
      >
        Pelaajien hallinta →
      </button>
    </div>
  );
}

function AddPlayer({ onSave, onCancel, canCancel }) {
  const [name, setName] = useState("");
  const [avatar, setAvatar] = useState("lion");
  const [themeKey, setThemeKey] = useState(DEFAULT_THEMES_BY_AVATAR["lion"] || "orange");
  const valid = name.trim().length > 0;

  // Kun hahmo vaihtuu, ehdotetaan myös oletusväriä — mutta vain jos käyttäjä ei ole vielä itse koskenut väriin
  const [themeManuallyChanged, setThemeManuallyChanged] = useState(false);
  function pickAvatar(id) {
    setAvatar(id);
    if (!themeManuallyChanged) {
      setThemeKey(DEFAULT_THEMES_BY_AVATAR[id] || "orange");
    }
  }
  function pickTheme(key) {
    setThemeKey(key);
    setThemeManuallyChanged(true);
  }

  const previewTheme = THEMES[themeKey] || THEMES.orange;
  const previewAvatar = AVATARS.find(a => a.id === avatar);
  const displayName = name.trim() || "...";

  return (
    <div className="animate-pop">
      {canCancel && (
        <button onClick={onCancel} className="mb-4 flex items-center gap-1 text-sm font-bold text-amber-800">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Takaisin
        </button>
      )}

      {/* LIVE-ESIKATSELU — päivittyy reaaliajassa */}
      <div className={`relative mb-5 overflow-hidden rounded-3xl bg-gradient-to-br ${previewTheme.gradient} p-6 text-white shadow-xl`}>
        <div className="text-xs font-bold uppercase tracking-wider opacity-90 mb-2">Esikatselu</div>
        <div className="flex items-center gap-4">
          <div className="text-6xl animate-float">{previewAvatar?.emoji || "🦁"}</div>
          <div className="flex-1">
            <div className="font-display text-3xl text-white" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.3)' }}>
              {displayName}
            </div>
            <div className="text-sm opacity-90 mt-1">{previewAvatar?.label}</div>
          </div>
        </div>
      </div>

      {/* NIMI */}
      <div className="mb-4 rounded-2xl border-2 border-amber-300 bg-white p-4 shadow">
        <label className="block text-xs font-extrabold uppercase tracking-wider text-orange-700 mb-2">Nimi</label>
        <input
          type="text"
          value={name}
          onChange={(e) => setName(e.target.value)}
          maxLength={20}
          placeholder="Esim. Leo"
          autoFocus
          className="w-full font-display text-xl text-amber-950 border-b-2 border-amber-200 focus:border-orange-500 focus:outline-none pb-1 bg-transparent"
        />
      </div>

      {/* HAHMO */}
      <div className="mb-4 rounded-2xl border-2 border-amber-300 bg-white p-4 shadow">
        <label className="block text-xs font-extrabold uppercase tracking-wider text-orange-700 mb-3">Hahmo</label>
        <div className="grid grid-cols-4 gap-2">
          {AVATARS.map(a => (
            <button
              key={a.id}
              onClick={() => pickAvatar(a.id)}
              className={`p-2 rounded-xl border-2 flex flex-col items-center gap-1 transition ${avatar === a.id ? "border-orange-500 bg-orange-50 ring-2 ring-orange-200" : "border-amber-200 bg-white"}`}
            >
              <div className="text-3xl">{a.emoji}</div>
              <div className="text-[10px] font-bold text-amber-900">{a.label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* VÄRI */}
      <div className="mb-6 rounded-2xl border-2 border-amber-300 bg-white p-4 shadow">
        <label className="block text-xs font-extrabold uppercase tracking-wider text-orange-700 mb-3">Väri</label>
        <div className="grid grid-cols-2 gap-2">
          {Object.entries(THEMES).map(([key, t]) => (
            <button
              key={key}
              onClick={() => pickTheme(key)}
              className={`p-3 rounded-xl bg-gradient-to-br ${t.gradient} text-white font-display text-sm shadow ${themeKey === key ? "ring-4 ring-amber-400" : ""}`}
            >
              {t.name}
            </button>
          ))}
        </div>
      </div>

      <BigButton onClick={() => valid && onSave({ name, avatar, theme: themeKey })} disabled={!valid}>
        Tallenna
      </BigButton>
    </div>
  );
}

function ManagePlayers({ players, onUpdate, onDelete, onBack }) {
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editAvatar, setEditAvatar] = useState("lion");
  const [editTheme, setEditTheme] = useState("orange");

  function startEdit(p) {
    setEditingId(p.id);
    setEditName(p.name);
    setEditAvatar(p.avatar);
    setEditTheme(p.theme);
  }

  function saveEdit() {
    onUpdate(editingId, { name: editName.trim(), avatar: editAvatar, theme: editTheme });
    setEditingId(null);
  }

  function confirmDelete(p) {
    if (confirm(`Haluatko varmasti poistaa pelaajan "${p.name}"? Kaikki hänen tietonsa häviävät.`)) {
      onDelete(p.id);
    }
  }

  return (
    <div className="animate-pop">
      <button onClick={onBack} className="mb-4 flex items-center gap-1 text-sm font-bold text-amber-800">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Takaisin
      </button>
      <h2 className="font-display text-3xl text-amber-900 mb-2">Pelaajien hallinta</h2>
      <p className="text-amber-800/70 mb-6">Muokkaa nimeä, hahmoa, väriä tai poista pelaaja.</p>

      <div className="space-y-3">
        {players.map(p => {
          const avatar = AVATARS.find(a => a.id === p.avatar);
          if (editingId === p.id) {
            return (
              <div key={p.id} className="rounded-2xl border-2 border-orange-400 bg-white p-4 shadow-xl">
                <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} maxLength={20}
                  className="w-full font-display text-xl text-amber-950 border-b-2 border-amber-200 focus:border-orange-500 focus:outline-none pb-1 bg-transparent mb-4" />
                <div className="text-xs font-extrabold uppercase tracking-wider text-orange-700 mb-2">Hahmo</div>
                <div className="grid grid-cols-3 gap-2 mb-4">
                  {AVATARS.map(a => (
                    <button key={a.id} onClick={() => setEditAvatar(a.id)}
                      className={`p-2 rounded-xl border-2 ${editAvatar === a.id ? "border-orange-500 bg-orange-50" : "border-amber-200 bg-white"}`}>
                      <div className="text-2xl">{a.emoji}</div>
                    </button>
                  ))}
                </div>
                <div className="text-xs font-extrabold uppercase tracking-wider text-orange-700 mb-2">Väriteema</div>
                <div className="grid grid-cols-2 gap-2 mb-4">
                  {Object.entries(THEMES).map(([key, t]) => (
                    <button key={key} onClick={() => setEditTheme(key)}
                      className={`p-3 rounded-xl border-2 bg-gradient-to-br ${t.gradient} text-white font-display text-sm ${editTheme === key ? "ring-4 ring-orange-200" : ""}`}>
                      {t.name}
                    </button>
                  ))}
                </div>
                <div className="flex gap-2">
                  <button onClick={saveEdit} className="flex-1 bg-orange-500 text-white rounded-xl py-2 font-display">Tallenna</button>
                  <button onClick={() => setEditingId(null)} className="flex-1 bg-amber-100 text-amber-900 rounded-xl py-2 font-display">Peruuta</button>
                </div>
                <button onClick={() => confirmDelete(p)} className="w-full mt-3 text-sm text-red-600 underline">Poista pelaaja</button>
              </div>
            );
          }
          return (
            <div key={p.id} className="flex items-center gap-3 rounded-2xl border-2 border-amber-200 bg-white p-4 shadow">
              <div className="text-4xl">{avatar?.emoji || "🦁"}</div>
              <div className="flex-1">
                <div className="font-display text-lg text-amber-900">{p.name}</div>
                <div className="text-xs text-amber-800/70">{(p.history || []).length} kirjausta</div>
              </div>
              <button onClick={() => startEdit(p)} className="rounded-xl bg-amber-100 px-3 py-2 text-sm font-bold text-amber-900">Muokkaa</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Home({ player, mission, onStart, streak, charLevel, theme, totalPoints, onUpdatePlayer }) {
  const [showQuickChange, setShowQuickChange] = useState(false);

  // Sumea progressin laskenta — ei näytetä numeroita, vain visuaalinen kasvu
  // Käytetään logaritmista skaalausta jotta korkeammillakin tasoilla näkyy edistystä
  const levels = [0, 15, 40, 80, 150];
  const currentLevelIndex = charLevel.level - 1;
  const currentMin = levels[currentLevelIndex];
  const nextMin = levels[currentLevelIndex + 1];
  let progressPercent;
  if (nextMin) {
    progressPercent = ((totalPoints - currentMin) / (nextMin - currentMin)) * 100;
    progressPercent = Math.max(5, Math.min(100, progressPercent));
  } else {
    // Maksimitasolla palkki on aina täynnä
    progressPercent = 100;
  }

  return (
    <div className="animate-pop">
      <div className={`relative mb-5 overflow-hidden rounded-3xl bg-gradient-to-br ${theme.gradient} p-7 text-white shadow-xl`}>
        <div className="absolute right-5 top-5 text-5xl animate-float">{charLevel.emoji}</div>
        {streak > 1 && (
          <div className="mb-4 inline-flex items-center gap-1.5 rounded-full bg-white px-3 py-1 text-sm font-extrabold text-orange-700 shadow">
            <span>🔥</span><span>{streak} päivää putkeen</span>
          </div>
        )}
        <h1 className="font-display text-2xl text-white mb-1" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.3)' }}>
          Hei {player.name}!
        </h1>
        <h2 className="font-display text-2xl text-white" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.3)' }}>Yksi rohkea hetki päivässä.</h2>
        <p className="font-display mt-2 text-base leading-snug text-white/95" style={{ textShadow: '0 1px 4px rgba(0,0,0,0.3)' }}>Ei lasketa onnistumista. Lasketaan rohkeutta.</p>
      </div>

      {/* Klikattava hahmokortti — paina vaihtaaksesi hahmoa tai väriä */}
      <button
        onClick={() => setShowQuickChange(true)}
        className="w-full mb-5 rounded-2xl border-2 border-amber-300 bg-gradient-to-br from-amber-50 to-orange-50 p-4 shadow text-left active:translate-y-0.5"
      >
        <div className="flex items-center gap-4">
          <div className="text-4xl">{charLevel.emoji}</div>
          <div className="flex-1">
            <div className="font-display text-base text-amber-900">{charLevel.title}</div>
            <div className="text-xs text-amber-800/70">{charLevel.desc}</div>
          </div>
          <div className="text-xs font-bold text-orange-700 bg-white rounded-full px-3 py-1 shadow">Vaihda ↻</div>
        </div>
        {/* Sumea rohkeusjana — ei numeroita, vain visuaalinen kasvu */}
        <div className="mt-3 h-2 w-full rounded-full bg-amber-200/60 overflow-hidden">
          <div
            className={`h-full bg-gradient-to-r ${theme.gradient} transition-all duration-700`}
            style={{ width: `${progressPercent}%` }}
          />
        </div>
        <div className="mt-1.5 text-[10px] font-bold uppercase tracking-wider text-amber-700/70 text-center">
          Rohkeus kasvaa
        </div>
      </button>

      {/* PÄIVÄN TEHTÄVÄ — korostettu, isompi, kategoriaemojilla */}
      <div className={`mb-5 rounded-3xl bg-gradient-to-br ${theme.gradient} p-6 text-white shadow-xl relative overflow-hidden`}>
        <div className="absolute right-4 top-4 text-5xl opacity-30">{MISSION_ICONS[mission.type] || "🎯"}</div>
        <div className="relative">
          <div className="flex items-center gap-2 text-xs font-extrabold uppercase tracking-wider opacity-90 mb-2">
            <span className="text-base">{MISSION_ICONS[mission.type] || "🎯"}</span>
            <span>Päivän tehtävä</span>
          </div>
          <p className="font-display text-xl leading-snug" style={{ textShadow: '0 1px 4px rgba(0,0,0,0.3)' }}>
            {mission.text}
          </p>
        </div>
      </div>
      <BigButton onClick={onStart}>Aloita 🚀</BigButton>
      <p className="mt-4 text-center text-sm text-amber-800/70">Kestää alle minuutin. Tehkää yhdessä.</p>

      {showQuickChange && (
        <QuickChangeModal
          player={player}
          onSave={(updates) => { onUpdatePlayer(updates); setShowQuickChange(false); }}
          onClose={() => setShowQuickChange(false)}
        />
      )}
    </div>
  );
}

// Pikavaihtomodaali — lapsi voi vaihtaa hahmoa ja väriä itse

  const [avatar, setAvatar] = useState(player.avatar);
  const [themeKey, setThemeKey] = useState(player.theme);

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4" onClick={onClose}>
      <div
        onClick={(e) => e.stopPropagation()}
        className="w-full max-w-md rounded-3xl bg-gradient-to-b from-orange-50 via-amber-50 to-rose-50 p-5 shadow-2xl animate-pop-big max-h-[90vh] overflow-y-auto"
      >
        <h2 className="font-display text-2xl text-amber-900 mb-1 text-center">Vaihda hahmoa</h2>
        <p className="text-sm text-amber-800/70 mb-4 text-center">{player.name}, valitse oma suosikki!</p>

        {/* Hahmo */}
        <div className="mb-4 rounded-2xl border-2 border-amber-300 bg-white p-3 shadow">
          <div className="text-xs font-extrabold uppercase tracking-wider text-orange-700 mb-2 px-1">Hahmo</div>
          <div className="grid grid-cols-4 gap-2">
            {AVATARS.map(a => (

function WeekView({ player, onBack }) {
  const history = player.history || [];
  const last7 = history.filter((h) => Date.now() - new Date(h.date).getTime() < 7 * 24 * 60 * 60 * 1000);
  const last14 = history.filter((h) => Date.now() - new Date(h.date).getTime() < 14 * 24 * 60 * 60 * 1000);
  const continuedCount = last7.filter((h) => h.continuedAfterMistake === "yes").length;
  const kinds = last7.reduce((acc, h) => { if (h.bravestKind) acc[h.bravestKind] = (acc[h.bravestKind] || 0) + 1; return acc; }, {});
  const topKind = Object.entries(kinds).sort((a, b) => b[1] - a[1])[0]?.[0];
  const kindNames = {
    steal: { name: "pallonriistoissa", emoji: "🛡️" }, trick: { name: "harhautuksissa", emoji: "🌀" },
    run: { name: "kuljetuksissa", emoji: "⚡" }, scared: { name: "tilanteisiin menemisessä", emoji: "🦁" },
    again: { name: "virheen jälkeen jatkamisessa", emoji: "🔁" }, fail: { name: "mokien sietämisessä", emoji: "😅" },
    newthing: { name: "uuden kokeilemisessa", emoji: "🌱" },
  };
  const topInfo = topKind ? kindNames[topKind] : null;

  // 14 päivän koonti — näkyy vain vanhemmalle, vain jos riittävästi kirjauksia
  const last14Brave = last14.filter(h => h.bravestMoment).length;
  const last14Continued = last14.filter(h => h.continuedAfterMistake === "yes").length;
  let twoWeekSummary = null;
  if (last14Brave >= 6) {
    // Valitse 2 ehdotusta vaihteleen päivän perusteella, etteivät aina samat
    const ideas = [
      "Tehkää yhdessä lemppariruoka",
      "Lähtekää yhdessä uimaan tai puistoon",
      "Katsokaa yhdessä elokuva, jonka lapsi valitsee",
      "Antakaa lapsen päättää illan ohjelma",
      "Kutsukaa kaveri kylään tai mennään hänen luokseen",
      "Tehkää retki paikkaan jossa ette ole käyneet",
      "Pelatkaa yhdessä lautapeliä tai pihapeliä",
      "Antakaa lapsen valita aamupala ja tehkää se yhdessä",
    ];
    const seed = Math.floor(Date.now() / (1000 * 60 * 60 * 24 * 14));
    const idea1 = ideas[seed % ideas.length];
    const idea2 = ideas[(seed + 3) % ideas.length];
    twoWeekSummary = {
      brave: last14Brave,
      continued: last14Continued,
      ideas: [idea1, idea2],
    };
  }

  let summary = null;
  if (last7.length > 0) {
    const moods = last7.map((h) => h.mood).filter(Boolean);
    const nervousCount = moods.filter((m) => m === "😬" || m === "😤").length;
    const positiveCount = moods.filter((m) => m === "😄" || m === "🦁").length;
    let observation, suggestion;
    if (continuedCount >= 3) observation = `${player.name} kertoi jatkaneensa virheen jälkeen ${continuedCount} kertaa. Tämä on viikon tärkein havainto.`;
    else if (nervousCount >= 3 && positiveCount === 0) observation = "Viikko on ollut jännittävä. Pelaaja silti kirjasi rohkeita hetkiä — se itsessään on rohkeutta.";
    else if (positiveCount >= 3) observation = "Viikko on tuntunut hyvältä. Hyvä hetki vahvistaa onnistumisten muistelua.";
    else if (topInfo) observation = `Viikon aikana toistui erityisesti rohkeus ${topInfo.name}. Kannattaa huomata tämä.`;
    else observation = "Viikolla on kirjautunut hetkiä. Jokainen kirjaus on jo askel.";
    if (continuedCount >= 2) suggestion = `Sano ${player.name}lle viikon päätteeksi: «Huomasin että jatkoit useamman virheen jälkeen tällä viikolla. Se on rohkeuden ydin.»`;
    else if (topInfo) suggestion = `Sano ${player.name}lle viikon päätteeksi: «Huomasin että ${topInfo.name} oli usein viikon rohkein hetki. Hieno juttu.»`;
    else suggestion = `Sano ${player.name}lle viikon päätteeksi: «Hyvä että muistit kirjata. Se itsessään on jo iso juttu.»`;
    summary = { observation, suggestion };
  }

  return (
    <div className="animate-pop">
      <button onClick={onBack} className="mb-4 flex items-center gap-1 text-sm font-bold text-amber-800">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Takaisin
      </button>
      <h2 className="font-display mb-1 text-3xl text-amber-900">{player.name} — Viikon rohkeus</h2>
      <p className="mb-5 text-sm text-amber-800/70">Vain havainnot — ei vertailua, ei tavoitteita.</p>
      {summary && (
        <div className="mb-5 rounded-2xl border-[3px] border-orange-400 bg-gradient-to-br from-orange-50 to-amber-100 p-5 shadow-xl">
          <div className="mb-2 flex items-center gap-2 text-xs font-extrabold uppercase tracking-wider text-orange-800">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Vanhemmalle — viikon koonti
          </div>
          <p className="font-display text-base leading-snug text-amber-950">{summary.observation}</p>
          <div className="mt-3 rounded-xl bg-white/70 p-3">
            <p className="font-display text-sm leading-snug text-amber-950">💡 <strong>{summary.suggestion}</strong></p>
          </div>
        </div>
      )}

      {/* 14 päivän koonti — näkyy vain vanhemmalle, ehdottaa yhteistä aikaa */}
      {twoWeekSummary && (
        <div className="mb-5 rounded-2xl border-[3px] border-violet-400 bg-gradient-to-br from-violet-50 to-pink-50 p-5 shadow-xl">
          <div className="mb-2 flex items-center gap-2 text-xs font-extrabold uppercase tracking-wider text-violet-800">
            <span className="text-base">🧡</span>
            <span>Vanhemmalle — kahden viikon havainto</span>
          </div>
          <p className="font-display text-base leading-snug text-violet-950">
            {player.name} on kirjannut <strong>{twoWeekSummary.brave} rohkeaa hetkeä</strong> viimeisten 14 päivän aikana.
            {twoWeekSummary.continued >= 2 && <> Hän on jatkanut virheen jälkeen <strong>{twoWeekSummary.continued} kertaa</strong>.</>}
          </p>
          <p className="font-display text-sm leading-snug text-violet-900 mt-2">
            Tämä on iso asia. Olisi hyvä juhlistaa yhdessä — ei palkintona vaan yhteisenä hetkenä:
          </p>
          <ul className="mt-3 space-y-1.5">
            {twoWeekSummary.ideas.map((idea, i) => (
              <li key={i} className="font-display text-sm leading-snug text-violet-950 flex items-start gap-2">
                <span className="text-violet-500 mt-0.5">•</span>
                <span>{idea}</span>
              </li>
            ))}
          </ul>
          <div className="mt-4 rounded-xl bg-white/70 p-3">
            <p className="font-display text-sm leading-snug text-violet-950">
              💡 <strong>Sano sitä tehdessä:</strong> «Huomasin että olet uskaltanut paljon viime aikoina. Halusin että vietämme aikaa yhdessä siksi.»
            </p>
          </div>
        </div>
      )}
      <div className="mb-4 grid grid-cols-2 gap-3">
        <Stat label="Treeniä kirjattu" value={last7.length} />
        <Stat label="Jatkoi virheen jälkeen" value={continuedCount} />
      </div>
      {topInfo && (
        <div className="mb-4 rounded-2xl bg-gradient-to-br from-amber-300 to-orange-400 p-5 text-white shadow-xl">
          <div className="text-xs font-bold uppercase tracking-wider opacity-90">Tällä viikolla</div>
          <p className="font-display mt-1 text-xl leading-snug">Rohkeus kasvoi erityisesti {topInfo.name} {topInfo.emoji}</p>
        </div>
      )}
      {last7.length > 0 && (
        <div className="rounded-2xl border-2 border-amber-200 bg-white p-4 shadow">
          <div className="mb-3 text-xs font-bold uppercase tracking-wider text-amber-700">Viikon hetket</div>
          <div className="space-y-2">
            {last7.slice(-7).reverse().map((h, i) => (
              <div key={i} className="flex items-start gap-3 border-t border-amber-100 pt-2 first:border-0 first:pt-0">
                <div className="text-2xl">{h.title.split(" ")[0]}</div>
                <div className="flex-1">
                  <div className="font-display text-sm text-amber-900">{h.bravestMoment || "—"}</div>
                  <div className="text-xs text-amber-700/70">{new Date(h.date).toLocaleDateString("fi-FI", { weekday: "long" })}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {last7.length === 0 && (
        <div className="rounded-2xl border-2 border-dashed border-amber-300 bg-white/60 p-6 text-center text-amber-800">
          <div className="mb-2 text-4xl">🦁</div>
          Ei kirjauksia vielä. Ei kiirettä — täytä, kun siltä tuntuu.
        </div>
      )}
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div className="rounded-2xl border-2 border-amber-200 bg-white p-4 text-center shadow">
      <div className="font-display text-4xl text-amber-900">{value}</div>
      <div className="text-xs font-bold uppercase tracking-wider text-amber-700">{label}</div>
    </div>
  );
}

function OptionButton({ selected, anySelected, onClick, children }) {
  let cls = "flex w-full items-center gap-3 rounded-2xl border-2 p-4 text-left transition-all duration-300 ";
  if (selected) cls += "border-orange-500 bg-orange-50 shadow-xl ring-4 ring-orange-200";
  else if (anySelected) cls += "border-amber-100 bg-white/40 opacity-40";
  else cls += "border-amber-200 bg-white shadow";
  return <button onClick={onClick} className={cls}>{children}</button>;
}

function StepNav({ onBack, onSkip, step, total }) {
  return (
    <div className="mb-4 flex items-center justify-between">
      <button onClick={onBack} className="flex items-center gap-1 rounded-full bg-white/70 px-3 py-1.5 text-sm font-bold text-amber-800 shadow" aria-label="Edellinen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Edellinen
      </button>
      {step && total && <div className="text-xs font-bold uppercase tracking-wider text-amber-700/70">{step} / {total}</div>}
      {onSkip && <button onClick={onSkip} className="rounded-full bg-white/70 px-3 py-1.5 text-sm font-bold text-amber-800 shadow">Ohita →</button>}
    </div>
  );
}

function EncourageBox({ reply }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      const t = setTimeout(() => { ref.current?.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 200);
      return () => clearTimeout(t);
    }
  }, [reply?.text]);
  if (!reply) return null;
  const style = TONE_STYLES[reply.tone] || TONE_STYLES.amber;
  const parts = reply.text.split(reply.highlight);
  return (
    <div ref={ref} className="animate-pop-big mt-6 relative">
      <div className="absolute -left-2 -top-3 z-10 flex h-12 w-12 items-center justify-center rounded-full border-[3px] border-white bg-white text-3xl shadow-xl animate-wiggle">{reply.icon}</div>
      <div className={`rounded-2xl border-[3px] p-5 pl-12 shadow-xl ${style.box}`}>
        <p className="font-display text-lg leading-snug">
          {parts[0]}
          <strong className={`rounded-md px-1.5 py-0.5 ${style.hl}`}>{reply.highlight}</strong>
          {parts[1]}
        </p>
      </div>
    </div>
  );
}

function BigButton({ children, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled}
      className={`w-full rounded-2xl px-6 py-5 font-display text-xl text-white shadow-xl transition ${disabled ? "cursor-not-allowed bg-amber-200 text-amber-500" : "bg-gradient-to-br from-orange-500 to-rose-500"}`}>
      {children}
    </button>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Rohkeusliiga />);
</script>
</body>
</html>
