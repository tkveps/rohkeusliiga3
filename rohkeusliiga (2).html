function makeLevels(avatarEmoji) {

    ];
}
function getCharacterLevel(points, avatarEmoji) {
    const levels = makeLevels(avatarEmoji);
    for (let i = levels.length - 1; i >= 0; i--) {
        if (points >= levels[i].min)
            return Object.assign({ level: i + 1 }, levels[i]);
    }
    return Object.assign({ level: 1 }, levels[0]);
}

// Valitsee päivän tehtävän painotuksen perusteella.
// Painotukset: "balanced" (tasaisesti), "defense60" (60% puolustus), "defense70" (70% puolustus),
// "attack60" (60% hyökkäys), "attack70" (70% hyökkäys).
// Loppuosa on aina sekoitus yleisiä ja toista kategoriaa.
function pickMissionForToday(focus) {
    const today = new Date();
    const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
    // Yhdistetty pooli painotuksen mukaan
    let pool = [];
    if (focus === "defense70") {
        pool = [].concat(MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_ATTACK);
    }
    else if (focus === "defense60") {
        pool = [].concat(MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_DEFENSE, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_ATTACK, MISSIONS_ATTACK);
    }
    else if (focus === "attack70") {
        pool = [].concat(MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_DEFENSE);
    }
    else if (focus === "attack60") {
        pool = [].concat(MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_ATTACK, MISSIONS_GENERAL, MISSIONS_GENERAL, MISSIONS_DEFENSE, MISSIONS_DEFENSE);
    }
    else {
        // balanced
        pool = [].concat(MISSIONS_DEFENSE, MISSIONS_ATTACK, MISSIONS_GENERAL);
    }
    // Litistä yksittäisten tehtävien listaksi
    const flat = [];
    pool.forEach(arr => { arr.forEach(m => flat.push(m)); });
    const mission = flat[seed % flat.length];
    // Selvitä mistä kategoriasta valittu tehtävä on
    let type = "general";
    if (MISSIONS_DEFENSE.indexOf(mission) !== -1)
        type = "defense";
    else if (MISSIONS_ATTACK.indexOf(mission) !== -1)
        type = "attack";
    return { text: mission, type: type };
}
function calculateStreak(history) {
    if (!history || history.length === 0)
        return 0;
    const days = [...new Set(history.map((h) => new Date(h.date).toDateString()))].map((s) => new Date(s)).sort((a, b) => b - a);
    if (days.length === 0)
        return 0;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const latest = new Date(days[0]);
    latest.setHours(0, 0, 0, 0);
    if (latest.getTime() !== today.getTime() && latest.getTime() !== yesterday.getTime())
        return 0;
    let streak = 1;
    for (let i = 1; i < days.length; i++) {
        const prev = new Date(days[i - 1]);
        prev.setHours(0, 0, 0, 0);
        const curr = new Date(days[i]);
        curr.setHours(0, 0, 0, 0);
        if (Math.round((prev - curr) / (1000 * 60 * 60 * 24)) === 1)
            streak++;
        else
            break;
    }
    return streak;
}
function getTotalPoints(history) {
    return history.reduce((sum, s) => sum + (s.points || calcSessionPoints(s)), 0);
}
function getUnlockedAchievements(history) {
    return ACHIEVEMENTS.filter(a => a.check(history));
}

function Rohkeusliiga() {
  const stored = loadStorage();
  const [players, setPlayers] = useState((stored && stored.players) || []);
  const [activePlayerId, setActivePlayerId] = useState(null);
  const [settings, setSettings] = useState(Object.assign({}, DEFAULT_SETTINGS, (stored && stored.settings) || {}));
  useEffect(function() { saveStorage({ players: players, settings: settings }); }, [players, settings]);
    // Ruutu — alkaa pelaajan valinnasta jos pelaajia on, muuten luonnista
    const [screen, setScreen] = useState("playerSelect");
    // Kirjauksen tila
    const [todayMission] = useState(() => pickMissionForToday(settings.focus));
    const [session, setSession] = useState(emptySession());
    const [currentSurprise, setCurrentSurprise] = useState(null);
    const [newAchievements, setNewAchievements] = useState([]);
    const [previousLevel, setPreviousLevel] = useState(1);
    function emptySession() {
        return {
            date: new Date().toISOString(),
            mood: null, bravestMoment: null, bravestKind: null,
            continuedAfterMistake: null, missionAttempted: null,
            title: "", minutes: 0, points: 0,
        };
    }
    const activePlayer = players.find(p => p.id === activePlayerId);
    const theme = activePlayer ? THEMES[activePlayer.theme] || THEMES.orange : THEMES.orange;
    function calcTitle(s) {
        const map = {
            steal: { text: "Riistoagentti", emoji: "🛡️" }, trick: { text: "Harhautusvelho", emoji: "🌀" },
            run: { text: "Kuljetussalama", emoji: "⚡" }, scared: { text: "Rohkeusleijona", emoji: "🦁" },
            again: { text: "Uudestaan yrittäjä", emoji: "🔁" }, fail: { text: "Mestarimokaaja", emoji: "😅" },
            newthing: { text: "Uuden kokeilija", emoji: "🌱" },
        };
        return map[s.bravestKind] || { text: "Tänään uskalsin -pelaaja", emoji: "💪" };
    }
    function calcMinutes(s, surprise) {
        if (!settings.rewardsOn)
            return 0;
        let m = s.bravestMoment ? settings.minMinutes : 0;
        if (s.continuedAfterMistake === "yes")
            m += settings.bonusMinutes;
        if (surprise && surprise.type === "minutes")
            m += 5;
        return Math.min(m, settings.dailyMaxMinutes);
    }
    function finalizeSession() {
        if (!activePlayer)
            return;
        const beforePts = getTotalPoints(activePlayer.history || []);
        const beforeLevel = getCharacterLevel(beforePts, getAvatarEmoji(activePlayer)).level;
        setPreviousLevel(beforeLevel);
        const surprise = maybeGetSurprise(session);
        setCurrentSurprise(surprise);
        const titleObj = calcTitle(session);
        let titleText = titleObj.text;
        if (surprise && surprise.type === "title")
            titleText = "Yllätysrohkea";
        const points = calcSessionPoints(session);
        const minutes = calcMinutes(session, surprise);
        const finished = Object.assign(Object.assign({}, session), { title: `${titleObj.emoji} ${titleText}`, minutes, points });
        const oldHistory = activePlayer.history || [];
        const beforeUnlocked = getUnlockedAchievements(oldHistory).map(a => a.id);
